name: EMT dependency fetch

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  fetch-wheels:
    runs-on: ubuntu-22.04
    steps:
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Download pinned CAD dependencies
        run: |
          python -m pip install --upgrade pip
          mkdir -p wheelhouse
          python -m pip download --only-binary=:all: --no-deps --dest wheelhouse \
            build123d==0.11.1 \
            manifold3d==3.5.2 \
            svgpathtools==1.7.2 \
            ezdxf==1.4.2 \
            ocpsvg==0.6.0 \
            ocp_gordon==0.2.1 \
            trianglesolver==1.2 \
            lib3mf==2.4.1
          sha256sum wheelhouse/* | sort > wheelhouse/SHA256SUMS.txt
      - name: Upload wheelhouse
        uses: actions/upload-artifact@v4
        with:
          name: emt-cad-wheelhouse
          path: wheelhouse
          if-no-files-found: error
          retention-days: 1
