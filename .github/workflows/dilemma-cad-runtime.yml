name: Dilemma Full Mechanical Source

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  source-payload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Restore full pinned mechanical tree
        run: |
          git clone --filter=blob:none --no-checkout https://github.com/Bastardkb/Dilemma.git upstream
          cd upstream
          git checkout f5cffb4821fe560b095418b71382ac7d8043c61a -- mechanical
          cd ..
          mkdir -p payload
          cp -a upstream/mechanical payload/
          find payload/mechanical -type f -print0 | sort -z | xargs -0 sha256sum > payload/mechanical_sha256.txt
          find payload/mechanical -type f | sort > payload/mechanical_inventory.txt
      - uses: actions/upload-artifact@v4
        with:
          name: dilemma-full-mechanical-source
          path: payload
          if-no-files-found: error
          retention-days: 7
