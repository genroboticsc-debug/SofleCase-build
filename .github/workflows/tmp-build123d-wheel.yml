name: Temporary Build123d 0.9.1 Artifact

on:
  pull_request:
    branches: [master]
  push:
    branches: [tmp/build123d-091-artifact]

permissions:
  contents: read

jobs:
  fetch-exact-novtk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Download exact no-VTK OCP wheel
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p runtime
          python -m pip index versions cadquery-ocp-novtk | tee versions.txt
          python -m pip download --only-binary=:all: --no-deps --dest runtime 'cadquery-ocp-novtk==7.8.1.1'
          (cd runtime && sha256sum * > SHA256SUMS.txt)
      - name: Upload exact no-VTK OCP runtime
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cadquery-ocp-novtk-7.8.1.1-cp313
          path: |
            runtime/
            versions.txt
          if-no-files-found: warn
          retention-days: 1
