name: Temporary Build123d 0.9.1 Artifact

on:
  pull_request:
    branches: [master]
  push:
    branches: [tmp/build123d-091-artifact]

permissions:
  contents: read

jobs:
  fetch-vtk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Download exact VTK runtime wheel
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p runtime
          python -m pip download --only-binary=:all: --no-deps --dest runtime 'vtk==9.3.1'
          (cd runtime && sha256sum * > SHA256SUMS.txt)
      - name: Upload exact VTK runtime
        uses: actions/upload-artifact@v4
        with:
          name: vtk-9.3.1-cp313
          path: runtime/
          if-no-files-found: error
          retention-days: 1
