name: Temporary Build123d 0.9.1 Artifact

on:
  pull_request:
    branches: [master]
  push:
    branches: [tmp/build123d-091-artifact]

permissions:
  contents: read

jobs:
  fetch-wheel:
    runs-on: ubuntu-latest
    steps:
      - name: Download exact wheel
        shell: bash
        run: |
          set -euo pipefail
          curl -fL --retry 5 --retry-all-errors \
            -o build123d-0.9.1-py3-none-any.whl \
            https://files.pythonhosted.org/packages/fa/f1/9adca2cf75b23c0678bd0460ec0386c9ccf32fe65f29d8ecaa4474905749/build123d-0.9.1-py3-none-any.whl
          echo "0e2a3c171d7db55329201438a95ab888df6c1b0fd13067a3780efcc8fbe1cc78  build123d-0.9.1-py3-none-any.whl" | sha256sum -c -
      - name: Upload verified wheel
        uses: actions/upload-artifact@v4
        with:
          name: build123d-0.9.1-py3-none-any
          path: build123d-0.9.1-py3-none-any.whl
          if-no-files-found: error
          retention-days: 1
