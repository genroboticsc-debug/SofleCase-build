name: Temporary Build123d 0.9.1 Artifact

on:
  pull_request:
    branches: [master]
  push:
    branches: [tmp/build123d-091-artifact]

permissions:
  contents: read

jobs:
  fetch-wheelhouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Download and verify exact Build123d wheel
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p wheelhouse
          curl -fL --retry 5 --retry-all-errors \
            -o wheelhouse/build123d-0.9.1-py3-none-any.whl \
            https://files.pythonhosted.org/packages/fa/f1/9adca2cf75b23c0678bd0460ec0386c9ccf32fe65f29d8ecaa4474905749/build123d-0.9.1-py3-none-any.whl
          echo "0e2a3c171d7db55329201438a95ab888df6c1b0fd13067a3780efcc8fbe1cc78  wheelhouse/build123d-0.9.1-py3-none-any.whl" | sha256sum -c -
      - name: Download compatible pure Python dependency wheelhouse
        shell: bash
        run: |
          set -euo pipefail
          python -m pip download --only-binary=:all: --dest wheelhouse \
            'typing_extensions>=4.6,<5' \
            'numpy>=2,<3' \
            'svgpathtools>=1.5.1,<2' \
            'anytree>=2.8,<3' \
            'ezdxf>=1.1,<2' \
            'ipython>=8,<9' \
            'py-lib3mf>=2.3.1' \
            'ocpsvg>=0.4' \
            trianglesolver
          (cd wheelhouse && sha256sum * > SHA256SUMS.txt)
      - name: Upload verified wheelhouse
        uses: actions/upload-artifact@v4
        with:
          name: build123d-0.9.1-wheelhouse-cp313
          path: wheelhouse/
          if-no-files-found: error
          retention-days: 1
