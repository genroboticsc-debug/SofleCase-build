name: Temporary Build123d 0.9.1 Artifact

on:
  pull_request:
    branches: [master]
  push:
    branches: [tmp/build123d-091-artifact]

permissions:
  contents: read

jobs:
  fetch-exact-runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Download Build123d and direct pure-Python runtime wheels
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p runtime
          python -m pip download --only-binary=:all: --no-deps --dest runtime \
            'build123d==0.9.1' \
            'typing_extensions>=4.6.0,<5' \
            'svgpathtools>=1.5.1,<2' \
            'anytree>=2.8.0,<3' \
            'ezdxf>=1.1.0,<2' \
            'ipython>=8.0.0,<9' \
            'py-lib3mf>=2.3.1' \
            'ocpsvg>=0.4' \
            'trianglesolver'
          (cd runtime && sha256sum * > SHA256SUMS.txt)
          python - <<'PY'
          from pathlib import Path
          for wheel in sorted(Path('runtime').glob('*.whl')):
              print(wheel.name)
          PY

      - name: Upload Build123d runtime
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build123d-0.9.1-py313-runtime
          path: runtime/
          if-no-files-found: error
          retention-days: 1
