name: Fetch Three font
on:
  pull_request:
    branches: [master]
permissions:
  contents: read
jobs:
  fetch:
    runs-on: ubuntu-22.04
    steps:
      - name: Fetch exact Three.js font
        run: |
          curl -fsSL https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/fonts/helvetiker_regular.typeface.json -o helvetiker_regular.typeface.json
          sha256sum helvetiker_regular.typeface.json > SHA256SUMS.txt
      - uses: actions/upload-artifact@v4
        with:
          name: three-helvetiker-font
          path: |
            helvetiker_regular.typeface.json
            SHA256SUMS.txt
          retention-days: 1
