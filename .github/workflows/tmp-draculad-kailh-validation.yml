name: Temporary DracuLad Kailh exact validation

on:
  pull_request:
    paths:
      - 'tmp_draculad/**'
      - '.github/workflows/tmp-draculad-kailh-validation.yml'

permissions:
  contents: read

jobs:
  exact-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout temporary branch
        uses: actions/checkout@v4

      - name: Set up pinned Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pinned CAD runtime
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'build123d==0.9.1'

      - name: Assemble auditable validator source
        run: |
          cat tmp_draculad/validator_src_*.pyfrag > tmp_draculad/run_validation.py
          python -m py_compile tmp_draculad/run_validation.py
          python -m py_compile tmp_draculad/interrogate_reference.py

      - name: Interrogate exact reference feature boundaries
        env:
          OCP_SHOW: '0'
          PYTHONUNBUFFERED: '1'
        run: |
          python tmp_draculad/interrogate_reference.py 2>&1 | tee tmp_draculad/interrogation_run.log

      - name: Fresh build and exact A-B plus B-A validation
        env:
          OCP_SHOW: '0'
          PYTHONUNBUFFERED: '1'
        run: |
          set -o pipefail
          python tmp_draculad/run_validation.py 2>&1 | tee tmp_draculad/validation_run.log

      - name: Upload exact validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: draculad-kailh-exact-validation
          if-no-files-found: warn
          path: |
            tmp_draculad/reference_feature_interrogation.json
            tmp_draculad/interrogation_run.log
            tmp_draculad/validation_result.json
            tmp_draculad/validation_run.log
            tmp_draculad/work/generated/components/Kailh-CherryMX-Socket.step
            tmp_draculad/work/generated/components/Kailh-CherryMX-Socket.stl
