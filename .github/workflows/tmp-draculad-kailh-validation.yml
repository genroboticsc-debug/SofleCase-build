name: Temporary DracuLad Kailh soldered exact validation

on:
  pull_request:
    paths:
      - 'tmp_draculad/**'
      - '.github/workflows/tmp-draculad-kailh-validation.yml'

concurrency:
  group: temporary-draculad-kailh-soldered-exact-validation
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  exact-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout temporary branch
        uses: actions/checkout@v4

      - name: Set up pinned Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pinned CAD runtime
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'build123d==0.9.1' scipy

      - name: Assemble SHA-verified analysis tools
        run: |
          cat tmp_draculad/validator_src_*.pyfrag > tmp_draculad/run_validation.py
          python -m py_compile tmp_draculad/run_validation.py
          python -m py_compile tmp_draculad/interrogate_solder_solids.py
          python - <<'PY'
          import base64, hashlib, lzma
          from pathlib import Path
          root = Path('tmp_draculad')
          encoded = ''.join(p.read_text().strip() for p in sorted(root.glob('orig_validator_xz_*.b64')))
          data = lzma.decompress(base64.b64decode(encoded))
          expected = '13e4630d7f87a05ab13588caf4d1224a759301f9a3754bc57334b5394608ca7f'
          actual = hashlib.sha256(data).hexdigest()
          if actual != expected:
              raise SystemExit(f'Original validator SHA mismatch: {actual}')
          path = root / 'original_validate_geometry.py'
          path.write_bytes(data)
          print(f'Original validator SHA-256: {actual}')
          PY
          python -m py_compile tmp_draculad/original_validate_geometry.py

      - name: Recover exact historical reference by SHA-256
        run: |
          git clone --quiet https://github.com/foostan/kbd.git /tmp/foostan-kbd
          python - <<'PY'
          import hashlib
          from pathlib import Path
          import re
          import subprocess

          repository = Path('/tmp/foostan-kbd')
          output = Path('tmp_draculad/work/kailh cherry socket soldered.reference.step')
          expected = '0b938e39f0fd84a6b424ef9c49f2c6aa8a232fa2a68f9105a0f9b821c987cc56'
          listing = subprocess.check_output(
              ['git', '-C', str(repository), 'rev-list', '--objects', '--all'],
              text=True,
          )
          matches = []
          for line in listing.splitlines():
              if ' ' not in line:
                  continue
              object_id, path = line.split(' ', 1)
              if not re.search(r'kailh.*cherry.*socket.*soldered.*\.step$', path, re.I):
                  continue
              data = subprocess.check_output(
                  ['git', '-C', str(repository), 'cat-file', 'blob', object_id]
              )
              digest = hashlib.sha256(data).hexdigest()
              matches.append({'object': object_id, 'path': path, 'sha256': digest})
              if digest == expected:
                  output.parent.mkdir(parents=True, exist_ok=True)
                  output.write_bytes(data)
                  break
          if not output.exists():
              raise SystemExit(f'Exact historical reference not found. Candidates: {matches}')
          print(f'Reference: {output}')
          print(f'SHA-256: {hashlib.sha256(output.read_bytes()).hexdigest()}')
          print(f'Candidates checked: {matches}')
          PY

      - name: Decode and fresh-build current production script
        env:
          OCP_SHOW: '0'
          PYTHONUNBUFFERED: '1'
        run: |
          python - <<'PY'
          import base64
          import hashlib
          import lzma
          import os
          from pathlib import Path
          import subprocess
          import sys

          root = Path('tmp_draculad')
          work = root / 'work'
          script = work / 'scripts' / 'components' / 'kailh cherry socket soldered.py'
          generated = work / 'generated' / 'components' / 'kailh cherry socket soldered.step'
          encoded = (root / 'kailh_soldered_script.xz.b64').read_text().strip()
          data = lzma.decompress(base64.b64decode(encoded))
          expected = '80c75a9f08d74e4827671d46165d47f1fdf03dae0a438cb1783b025aa2d3b833'
          actual = hashlib.sha256(data).hexdigest()
          if actual != expected:
              raise SystemExit(f'Production script SHA mismatch: {actual}')
          script.parent.mkdir(parents=True, exist_ok=True)
          script.write_bytes(data)
          env = dict(os.environ, OCP_SHOW='0', PYTHONUNBUFFERED='1')
          result = subprocess.run(
              [sys.executable, str(script), str(generated.parent)],
              text=True,
              capture_output=True,
              env=env,
              timeout=900,
          )
          (root / 'kailh_soldered_fresh_build.log').write_text(
              result.stdout + '\n--- STDERR ---\n' + result.stderr
          )
          if result.returncode != 0 or not generated.exists():
              raise SystemExit('Fresh production build failed')
          print(generated)
          PY

      - name: Interrogate exact reference and generated solids
        env:
          OCP_SHOW: '0'
          PYTHONUNBUFFERED: '1'
        run: |
          python tmp_draculad/interrogate_solder_solids.py \
            'tmp_draculad/work/kailh cherry socket soldered.reference.step' \
            'tmp_draculad/work/generated/components/kailh cherry socket soldered.step' \
            2>&1 | tee tmp_draculad/kailh_soldered_interrogation.log

      - name: Run original project exact bodywise Splitter validator
        env:
          OCP_SHOW: '0'
          PYTHONUNBUFFERED: '1'
        run: |
          set -o pipefail
          python -u tmp_draculad/original_validate_geometry.py \
            --worker --root tmp_draculad/work bodywise \
            'tmp_draculad/work/kailh cherry socket soldered.reference.step' \
            'tmp_draculad/work/generated/components/kailh cherry socket soldered.step' \
            2>&1 | tee tmp_draculad/kailh_soldered_bodywise_validation.log

      - name: Summarize exact result
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          log = Path('tmp_draculad/kailh_soldered_bodywise_validation.log')
          lines = [
              line.strip() for line in log.read_text().splitlines()
              if line.strip().startswith('{')
          ] if log.exists() else []
          payload = json.loads(lines[-1]) if lines else {
              'success': False,
              'error': 'no JSON result',
          }
          interrogation_path = Path('tmp_draculad/kailh_soldered_feature_interrogation.json')
          if payload.get('success') and interrogation_path.exists():
              interrogation = json.loads(interrogation_path.read_text())
              ref_volume = interrogation['reference']['compound_volume']
              payload['reference_volume_mm3'] = ref_volume
              payload['xor_percent_reference_compound'] = 100.0 * payload['xor_volume'] / ref_volume
              payload['strict_under_0_01_percent'] = payload['xor_percent_reference_compound'] < 0.01
              payload['fallback_used'] = False
          output = Path('tmp_draculad/kailh_soldered_bodywise_summary.json')
          output.write_text(json.dumps(payload, indent=2))
          print(json.dumps(payload, indent=2))
          PY

      - name: Upload exact validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: draculad-kailh-soldered-exact-validation
          if-no-files-found: warn
          path: |
            tmp_draculad/kailh_soldered_feature_interrogation.json
            tmp_draculad/kailh_soldered_interrogation.log
            tmp_draculad/kailh_soldered_bodywise_summary.json
            tmp_draculad/kailh_soldered_bodywise_validation.log
            tmp_draculad/kailh_soldered_fresh_build.log
            tmp_draculad/work/generated/components/kailh cherry socket soldered.step
            tmp_draculad/work/generated/components/kailh cherry socket soldered.stl
