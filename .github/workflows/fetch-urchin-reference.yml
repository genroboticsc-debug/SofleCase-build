name: Fetch Urchin Exact Reference

on:
  push:
    paths:
      - '.github/workflows/fetch-urchin-reference.yml'
  pull_request:
  workflow_dispatch:

jobs:
  fetch-and-convert:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Create output directory
        run: mkdir -p out

      - name: Download exact upstream Urchin source files
        shell: bash
        run: |
          set -euxo pipefail
          base='https://raw.githubusercontent.com/duckyb/urchin/main/3d-prints/case-by-chewiedies'
          curl -fL --retry 5 --retry-delay 2 "$base/Urchin_Tray_Case.f3d" -o out/Urchin_Tray_Case_reference.f3d
          curl -fL --retry 5 --retry-delay 2 "$base/v1-TrayWithChamfer-capture.stl" -o out/v1-TrayWithChamfer-capture_reference.stl
          curl -fL --retry 5 --retry-delay 2 "$base/v1-TrayWithChamfer-inserts.stl" -o out/v1-TrayWithChamfer-inserts_reference.stl
          curl -fL --retry 5 --retry-delay 2 "$base/v1-TrayWithFillet-capture.stl" -o out/v1-TrayWithFillet-capture_reference.stl
          curl -fL --retry 5 --retry-delay 2 "$base/v1-TrayWithFillet-inserts.stl" -o out/v1-TrayWithFillet-inserts_reference.stl
          sha256sum out/* > out/SHA256SUMS.txt
          ls -lah out

      - name: Install cadmpeg
        shell: bash
        run: |
          set -euxo pipefail
          curl --proto '=https' --tlsv1.2 -LsSf https://github.com/cadmpeg/cadmpeg/releases/latest/download/cadmpeg-installer.sh | sh
          CADMPEG_BIN="$(command -v cadmpeg || find "$HOME" -type f -name cadmpeg -perm -111 | head -n 1)"
          test -n "$CADMPEG_BIN"
          echo "CADMPEG_BIN=$CADMPEG_BIN" >> "$GITHUB_ENV"
          cp "$CADMPEG_BIN" out/cadmpeg-linux-x86_64
          chmod +x out/cadmpeg-linux-x86_64

      - name: Decode and convert native F3D
        shell: bash
        run: |
          set -o pipefail
          "$CADMPEG_BIN" --version 2>&1 | tee out/cadmpeg-version.txt
          "$CADMPEG_BIN" convert --help > out/cadmpeg-convert-help.txt 2>&1 || true
          "$CADMPEG_BIN" inspect out/Urchin_Tray_Case_reference.f3d --json > out/Urchin_Tray_Case_inspect.json 2> out/Urchin_Tray_Case_inspect.stderr.txt || true
          "$CADMPEG_BIN" decode out/Urchin_Tray_Case_reference.f3d -o out/Urchin_Tray_Case_reference.cadir.json 2>&1 | tee out/Urchin_Tray_Case_decode.log || true
          "$CADMPEG_BIN" convert out/Urchin_Tray_Case_reference.f3d -f step -o out/Urchin_Tray_Case_reference_cadmpeg.step --allow-invalid 2>&1 | tee out/Urchin_Tray_Case_convert_allow_invalid.log || true
          ls -lah out

      - name: Upload exact references and decoded output
        uses: actions/upload-artifact@v4
        with:
          name: urchin-exact-reference-v2
          path: out/
          if-no-files-found: error
          retention-days: 7
