name: Three font LCEDA audit

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-22.04
    steps:
      - name: Download official Three.js font definitions
        run: |
          set -euxo pipefail
          mkdir fonts
          base=https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/fonts
          for name in \
            helvetiker_regular helvetiker_bold \
            optimer_regular optimer_bold \
            gentilis_regular gentilis_bold \
            droid/droid_sans_regular droid/droid_sans_bold \
            droid/droid_serif_regular droid/droid_serif_bold; do
            out=$(echo "$name" | tr '/' '_')
            curl -fsSL "$base/$name.typeface.json" -o "fonts/$out.typeface.json"
          done
      - name: Extract only LCEDA source glyphs
        run: |
          python - <<'PY'
          import json, pathlib, hashlib
          result={}
          for path in sorted(pathlib.Path('fonts').glob('*.json')):
              data=json.loads(path.read_text())
              result[path.name]={
                  'familyName':data.get('familyName'),
                  'resolution':data.get('resolution'),
                  'boundingBox':data.get('boundingBox'),
                  'glyphs':{ch:data.get('glyphs',{}).get(ch) for ch in 'LCEDA'},
                  'sha256':hashlib.sha256(path.read_bytes()).hexdigest(),
              }
          pathlib.Path('three_lceda_glyphs.json').write_text(json.dumps(result,indent=2))
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: three-lceda-glyph-audit
          path: three_lceda_glyphs.json
          if-no-files-found: error
          retention-days: 1
