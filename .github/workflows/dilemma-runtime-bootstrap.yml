name: Temporary Dilemma exact-runtime bootstrap

on:
  push:
    branches: [master]
    paths:
      - .github/workflows/dilemma-runtime-bootstrap.yml
  pull_request:
    branches: [master]
    paths:
      - .github/workflows/dilemma-runtime-bootstrap.yml
      - .github/dilemma-runtime-bootstrap-trigger.txt
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bundle:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out bootstrap repository
        uses: actions/checkout@v4

      - name: Set up locked Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Download exact locked Python wheels
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p bundle/wheels
          python -m pip download --only-binary=:all: --no-deps \
            build123d==0.11.1 manifold3d==3.5.2 \
            --dest bundle/wheels

          BUILD123D_WHEEL="$(find bundle/wheels -maxdepth 1 -type f -name 'build123d-0.11.1-*.whl' -print -quit)"
          MANIFOLD_WHEEL="$(find bundle/wheels -maxdepth 1 -type f -name 'manifold3d-3.5.2-*.whl' -print -quit)"
          test -n "$BUILD123D_WHEEL"
          test -n "$MANIFOLD_WHEEL"

          echo '4e95fa7ccbdc83e624313be492e7c4f5f0eb2ea1df36130eb718bb0c25a89e10  '"$BUILD123D_WHEEL" | sha256sum --check --strict
          echo 'bbfd7a445aeeb24d1e17749e742c637db69fd15f6005ace3fb1a8bfa52beae45  '"$MANIFOLD_WHEEL" | sha256sum --check --strict

      - name: Fetch pinned Dilemma reference commit
        shell: bash
        run: |
          set -euo pipefail
          git init dilemma-reference
          git -C dilemma-reference remote add origin https://github.com/Bastardkb/Dilemma.git
          git -C dilemma-reference fetch --depth=1 origin f5cffb4821fe560b095418b71382ac7d8043c61a
          git -C dilemma-reference checkout --detach FETCH_HEAD

          mkdir -p bundle/reference
          while IFS= read -r relative_path; do
            mkdir -p "bundle/reference/$(dirname "$relative_path")"
            cp "dilemma-reference/$relative_path" "bundle/reference/$relative_path"
          done <<'EOF'
          mechanical/cases/3x5_2/tenting_puck/tenting_puck_v3_26.stl
          mechanical/cases/3x5_2/tenting_puck_hex/STEP/Dilemma Case Integrated Tenting Puck.STEP
          mechanical/cases/3x5_2/tenting_puck_hex/STEP/Dilemma Case Tenting Puck Opening.STEP
          mechanical/cases/3x5_2/thin/dilemma_nuts v27.step
          mechanical/cases/3x5_3_hotswap/mid.stl
          mechanical/cases/4x6_4/top.stl
          mechanical/cases/4x6_4_hotswap/mid.stl
          EOF

          printf '%s\n' 'f5cffb4821fe560b095418b71382ac7d8043c61a' > bundle/DILEMMA_REFERENCE_COMMIT.txt
          find bundle -type f -print0 | sort -z | xargs -0 sha256sum > bundle/SHA256SUMS.txt

      - name: Upload exact runtime and references
        uses: actions/upload-artifact@v4
        with:
          name: dilemma-exact-runtime-and-references
          path: bundle
          if-no-files-found: error
          retention-days: 1
