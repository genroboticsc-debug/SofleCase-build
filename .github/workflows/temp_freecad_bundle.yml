name: Temp FreeCAD AppImage Bundle

on:
  pull_request:
    branches:
      - master
    paths:
      - '.github/workflows/temp_freecad_bundle.yml'

jobs:
  bundle-freecad:
    runs-on: ubuntu-latest
    steps:
      - name: Download and split latest stable FreeCAD AppImage
        shell: bash
        run: |
          set -euxo pipefail
          api='https://api.github.com/repos/FreeCAD/FreeCAD/releases/latest'
          url="$(curl -fsSL "$api" | jq -r '[.assets[].browser_download_url | select(test("Linux.*x86_64.*AppImage$"; "i"))][0] // empty')"
          if [ -z "$url" ]; then
            url="$(curl -fsSL "$api" | jq -r '[.assets[].browser_download_url | select(test("x86_64.*AppImage$"; "i"))][0] // empty')"
          fi
          test -n "$url"
          echo "$url"
          curl -fL "$url" -o FreeCAD.AppImage
          sha256sum FreeCAD.AppImage > FreeCAD.AppImage.sha256
          split -b 350M -d -a 2 FreeCAD.AppImage FreeCAD.AppImage.part-
          ls -lh FreeCAD.AppImage FreeCAD.AppImage.part-* FreeCAD.AppImage.sha256
      - name: Upload FreeCAD part 00
        uses: actions/upload-artifact@v4
        with:
          name: freecad-appimage-part-00
          path: FreeCAD.AppImage.part-00
          compression-level: 0
          retention-days: 1
      - name: Upload FreeCAD part 01
        uses: actions/upload-artifact@v4
        with:
          name: freecad-appimage-part-01
          path: FreeCAD.AppImage.part-01
          compression-level: 0
          retention-days: 1
      - name: Upload FreeCAD part 02 and checksum
        uses: actions/upload-artifact@v4
        with:
          name: freecad-appimage-part-02
          path: |
            FreeCAD.AppImage.part-02
            FreeCAD.AppImage.sha256
          compression-level: 0
          retention-days: 1
