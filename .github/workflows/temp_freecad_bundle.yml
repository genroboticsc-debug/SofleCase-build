name: Temp FreeCAD AppImage Bundle

on:
  pull_request:
    branches:
      - master
    paths:
      - '.github/workflows/temp_freecad_bundle.yml'

jobs:
  bundle-freecad:
    runs-on: ubuntu-latest
    steps:
      - name: Download latest stable FreeCAD AppImage
        shell: bash
        run: |
          set -euxo pipefail
          api='https://api.github.com/repos/FreeCAD/FreeCAD/releases/latest'
          url="$(curl -fsSL "$api" | jq -r '[.assets[].browser_download_url | select(test("Linux.*x86_64.*AppImage$"; "i"))][0] // empty')"
          if [ -z "$url" ]; then
            url="$(curl -fsSL "$api" | jq -r '[.assets[].browser_download_url | select(test("x86_64.*AppImage$"; "i"))][0] // empty')"
          fi
          test -n "$url"
          echo "$url"
          curl -fL "$url" -o FreeCAD.AppImage
          chmod +x FreeCAD.AppImage
          ls -lh FreeCAD.AppImage
      - name: Upload FreeCAD AppImage
        uses: actions/upload-artifact@v4
        with:
          name: freecad-appimage
          path: FreeCAD.AppImage
          compression-level: 0
          if-no-files-found: error
          retention-days: 1
