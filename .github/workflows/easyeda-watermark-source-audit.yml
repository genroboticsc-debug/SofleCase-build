name: EasyEDA watermark source audit

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-22.04
    steps:
      - name: Download and verify official EasyEDA Standard package
        run: |
          set -euxo pipefail
          curl -fL --retry 3 -o easyeda-linux-x64-6.5.51.zip \
            https://image.easyeda.com/files/easyeda-linux-x64-6.5.51.zip
          echo '40b85f629635a1ae3e2b34c124f963d6dc9bf4de6254c794f7b12c5dd95c2f02  easyeda-linux-x64-6.5.51.zip' | sha256sum -c -
      - name: Extract application resources
        run: |
          set -euxo pipefail
          mkdir -p audit/root audit/asars audit/report audit/assets
          unzip -q easyeda-linux-x64-6.5.51.zip -d audit/root
          while IFS= read -r -d '' z; do
            d="audit/root/nested_$(basename "$z" .zip)"
            mkdir -p "$d"
            unzip -q "$z" -d "$d" || true
          done < <(find audit/root -type f -name '*.zip' -print0)
          find audit/root -type f | sort > audit/report/all_files.txt
          find audit/root -type f \( -iname '*.asar' -o -iname '*.asar.unpacked' \) -print > audit/report/asar_paths.txt
          npm install --silent --no-save @electron/asar@3.2.13
          while IFS= read -r asar; do
            [ -f "$asar" ] || continue
            out="audit/asars/$(echo "$asar" | sed 's#[/ ]#_#g')"
            mkdir -p "$out"
            npx asar extract "$asar" "$out" || true
          done < audit/report/asar_paths.txt
          find audit/asars -type f | sort >> audit/report/all_files.txt
      - name: Search watermark implementation and collect source assets
        run: |
          set -euxo pipefail
          roots=(audit/root audit/asars)
          grep -RInaE --binary-files=text \
            'LCEDA|EasyEDA|watermark|Watermark|FontLoader|TextGeometry|typeface|fontFamily|font-family|3[Dd][ -]?[Mm]odel' \
            "${roots[@]}" > audit/report/string_hits.txt || true
          find "${roots[@]}" -type f \( \
              -iname '*.ttf' -o -iname '*.otf' -o -iname '*.woff' -o -iname '*.woff2' \
              -o -iname '*typeface*.json' -o -iname '*font*.json' -o -iname '*logo*.svg' \
              -o -iname '*easyeda*.svg' -o -iname '*lceda*.svg' \
            \) -print | sort > audit/report/candidate_assets.txt
          while IFS= read -r f; do
            [ -f "$f" ] || continue
            size=$(stat -c '%s' "$f")
            if [ "$size" -le 10000000 ]; then
              rel=$(echo "$f" | sed 's#[/ ]#_#g')
              cp "$f" "audit/assets/$rel"
            fi
          done < audit/report/candidate_assets.txt
          sha256sum audit/assets/* > audit/report/asset_sha256.txt 2>/dev/null || true
          du -ah audit/assets | sort -h > audit/report/asset_sizes.txt
          sed -n '1,5000p' audit/report/string_hits.txt > audit/report/string_hits_head5000.txt
      - name: Upload audit results
        uses: actions/upload-artifact@v4
        with:
          name: easyeda-watermark-source-audit
          path: |
            audit/report
            audit/assets
          if-no-files-found: error
          retention-days: 1
