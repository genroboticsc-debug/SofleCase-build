name: EMT svgelements fetch

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  fetch-wheel:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Download exact wheel
        run: |
          mkdir -p wheelhouse
          python -m pip download --only-binary=:all: --no-deps --dest wheelhouse svgelements==1.9.6
          sha256sum wheelhouse/* > wheelhouse/SHA256SUMS.txt
      - uses: actions/upload-artifact@v4
        with:
          name: emt-svgelements-wheel
          path: wheelhouse
          retention-days: 1
