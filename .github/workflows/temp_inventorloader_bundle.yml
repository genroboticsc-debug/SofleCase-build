name: Temp InventorLoader Bundle

on:
  pull_request:
    branches:
      - master
    paths:
      - '.github/workflows/temp_inventorloader_bundle.yml'

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Clone InventorLoader
        run: |
          set -euxo pipefail
          git clone --depth 1 https://github.com/jmplonka/InventorLoader.git InventorLoader
          rm -rf InventorLoader/.git
      - name: Upload InventorLoader
        uses: actions/upload-artifact@v4
        with:
          name: inventorloader-source
          path: InventorLoader/
          retention-days: 1
