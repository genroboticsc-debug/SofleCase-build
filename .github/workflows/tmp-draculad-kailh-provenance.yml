name: Temporary DracuLad Kailh exact candidate and provenance

on:
  pull_request:
    paths:
      - '.github/workflows/tmp-draculad-kailh-provenance.yml'
      - 'tmp_draculad/provenance_trigger.txt'

concurrency:
  group: temporary-draculad-kailh-exact-candidate
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  provenance:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout temporary branch
        uses: actions/checkout@v4

      - name: Recover surviving editable Fusion solder source
        run: |
          set -euo pipefail
          git clone --quiet https://github.com/foostan/kbd.git /tmp/foostan-kbd
          mkdir -p tmp_draculad/historical_sources
          git -C /tmp/foostan-kbd cat-file blob \
            e89e427d7a4a897090d8548b6ded44c6ae091adf \
            > 'tmp_draculad/historical_sources/D_SOD-123 Soldered.f3z'
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          source = Path('tmp_draculad/historical_sources/D_SOD-123 Soldered.f3z')
          payload = {
              'kailh_reference_sha256': '0b938e39f0fd84a6b424ef9c49f2c6aa8a232fa2a68f9105a0f9b821c987cc56',
              'kailh_reference_git_blob': 'f7f6a3420c03fe28eb78dd28473327d710f68a2a',
              'source_commit': '230c6d634a8d409cbd1c506ec0260420a08a1c83',
              'source_commit_date': '2020-09-28T01:29:15+09:00',
              'surviving_editable_source': {
                  'path': 'kicad-packages3D/kbd.3dshapes/D_SOD-123 Soldered.f3z',
                  'git_blob': 'e89e427d7a4a897090d8548b6ded44c6ae091adf',
                  'sha256': hashlib.sha256(source.read_bytes()).hexdigest(),
                  'size_bytes': source.stat().st_size,
              },
              'finding': 'No editable Kailh source exists in repository history; this Fusion archive is the only soldered editable source in the same author commit.',
          }
          Path('tmp_draculad/kailh_provenance.json').write_text(json.dumps(payload, indent=2))
          print(json.dumps(payload, indent=2))
          PY

      - name: Upload provenance evidence
        uses: actions/upload-artifact@v4
        with:
          name: draculad-kailh-source-provenance
          path: |
            tmp_draculad/kailh_provenance.json
            tmp_draculad/historical_sources/**

  candidate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout temporary branch
        uses: actions/checkout@v4

      - name: Set up pinned Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pinned CAD runtime
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'build123d==0.9.1' scipy

      - name: Assemble SHA-verified validator
        run: |
          cat tmp_draculad/validator_src_*.pyfrag > tmp_draculad/run_validation.py
          python -m py_compile tmp_draculad/run_validation.py
          python - <<'PY'
          import base64, hashlib, lzma
          from pathlib import Path
          root = Path('tmp_draculad')
          encoded = ''.join(p.read_text().strip() for p in sorted(root.glob('orig_validator_xz_*.b64')))
          data = lzma.decompress(base64.b64decode(encoded))
          expected = '13e4630d7f87a05ab13588caf4d1224a759301f9a3754bc57334b5394608ca7f'
          actual = hashlib.sha256(data).hexdigest()
          if actual != expected:
              raise SystemExit(f'Validator SHA mismatch: {actual}')
          (root / 'original_validate_geometry.py').write_bytes(data)
          PY
          python -m py_compile tmp_draculad/original_validate_geometry.py

      - name: Recover exact soldered reference by SHA-256
        run: |
          git clone --quiet https://github.com/foostan/kbd.git /tmp/foostan-kbd
          python - <<'PY'
          import hashlib, re, subprocess
          from pathlib import Path
          repo = Path('/tmp/foostan-kbd')
          output = Path('tmp_draculad/work/kailh cherry socket soldered.reference.step')
          expected = '0b938e39f0fd84a6b424ef9c49f2c6aa8a232fa2a68f9105a0f9b821c987cc56'
          listing = subprocess.check_output(['git','-C',str(repo),'rev-list','--objects','--all'], text=True)
          for line in listing.splitlines():
              if ' ' not in line:
                  continue
              object_id, path = line.split(' ', 1)
              if not re.search(r'kailh.*cherry.*socket.*soldered.*\.step$', path, re.I):
                  continue
              data = subprocess.check_output(['git','-C',str(repo),'cat-file','blob',object_id])
              if hashlib.sha256(data).hexdigest() == expected:
                  output.parent.mkdir(parents=True, exist_ok=True)
                  output.write_bytes(data)
                  break
          if not output.exists() or hashlib.sha256(output.read_bytes()).hexdigest() != expected:
              raise SystemExit('Exact soldered reference recovery failed')
          PY

      - name: Decode and fresh-build current production script
        env:
          OCP_SHOW: '0'
          PYTHONUNBUFFERED: '1'
        run: |
          python - <<'PY'
          import base64, hashlib, lzma, os, subprocess, sys
          from pathlib import Path
          root = Path('tmp_draculad')
          script = root / 'work/scripts/components/kailh cherry socket soldered.py'
          generated = root / 'work/generated/components/kailh cherry socket soldered.step'
          data = lzma.decompress(base64.b64decode((root/'kailh_soldered_script.xz.b64').read_text().strip()))
          expected = '80c75a9f08d74e4827671d46165d47f1fdf03dae0a438cb1783b025aa2d3b833'
          actual = hashlib.sha256(data).hexdigest()
          if actual != expected:
              raise SystemExit(f'Production script SHA mismatch: {actual}')
          script.parent.mkdir(parents=True, exist_ok=True)
          script.write_bytes(data)
          result = subprocess.run(
              [sys.executable,str(script),str(generated.parent)],
              text=True,capture_output=True,
              env=dict(os.environ,OCP_SHOW='0',PYTHONUNBUFFERED='1'),timeout=900,
          )
          (root/'candidate2_fresh_build.log').write_text(result.stdout+'\n--- STDERR ---\n'+result.stderr)
          if result.returncode != 0 or not generated.exists():
              raise SystemExit('Fresh production build failed')
          PY

      - name: Patch selector to ten curved terminal edges
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('tmp_draculad/interrogate_solder_solids.py')
          text = path.read_text()
          old = '''        if abs(bounds[0] - raw_end_x) <= 2.0e-5 and abs(bounds[3] - raw_end_x) <= 2.0e-5:
            terminal_edges.append(edge)
            terminal_edge_bounds.append(bounds)
    if len(terminal_edges) != 2:
        raise RuntimeError(
            f"Expected two terminal perimeter edges at X={raw_end_x}, found {len(terminal_edges)}: {terminal_edge_bounds}"
        )
'''
          new = '''        on_terminal_plane = (
            abs(bounds[0] - raw_end_x) <= 2.0e-5
            and abs(bounds[3] - raw_end_x) <= 2.0e-5
        )
        is_horizontal_top_land = (
            abs(bounds[2] - PAD_Z_MIN_MM) <= 2.0e-5
            and abs(bounds[5] - PAD_Z_MIN_MM) <= 2.0e-5
        )
        if on_terminal_plane and not is_horizontal_top_land:
            terminal_edges.append(edge)
            terminal_edge_bounds.append(bounds)
    if len(terminal_edges) != 10:
        raise RuntimeError(
            f"Expected ten curved terminal perimeter edges at X={raw_end_x}, found {len(terminal_edges)}: {terminal_edge_bounds}"
        )
'''
          if old not in text:
              raise SystemExit('Expected selector block not found')
          path.write_text(text.replace(old, new))
          PY
          python -m py_compile tmp_draculad/interrogate_solder_solids.py

      - name: Build candidate and run exact pairwise Boolean
        env:
          OCP_SHOW: '0'
          PYTHONUNBUFFERED: '1'
        run: |
          set -o pipefail
          python tmp_draculad/interrogate_solder_solids.py \
            'tmp_draculad/work/kailh cherry socket soldered.reference.step' \
            'tmp_draculad/work/generated/components/kailh cherry socket soldered.step' \
            2>&1 | tee tmp_draculad/candidate2_run.log

      - name: Upload exact candidate evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: draculad-kailh-solder-candidate2
          if-no-files-found: warn
          path: |
            tmp_draculad/kailh_soldered_feature_interrogation.json
            tmp_draculad/candidate2_run.log
            tmp_draculad/candidate2_fresh_build.log
            tmp_draculad/kailh_native_solder_candidate.step
            tmp_draculad/kailh_reference_solder_right.step
